name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.1', laravel: '^10.0', testbench: '^8.0' }
          - { php: '8.2', laravel: '^10.0', testbench: '^8.0' }
          - { php: '8.2', laravel: '^11.0', testbench: '^9.0' }
          - { php: '8.2', laravel: '^12.0', testbench: '^10.0' }
          - { php: '8.3', laravel: '^11.0', testbench: '^9.0' }
          - { php: '8.3', laravel: '^12.0', testbench: '^10.0' }
          - { php: '8.3', laravel: '^13.0', testbench: '^11.0' }
          - { php: '8.4', laravel: '^12.0', testbench: '^10.0' }
          - { php: '8.4', laravel: '^13.0', testbench: '^11.0' }

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Install dependencies
        run: |
          composer require --no-update \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}"
          composer update --prefer-dist --no-interaction --no-progress --prefer-stable

      - name: Run tests
        run: vendor/bin/phpunit
